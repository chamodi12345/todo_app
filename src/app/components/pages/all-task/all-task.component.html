<app-page-title></app-page-title>

<div class="flex mt-6">
  <input type="text" class="w-full h-16 px-4 py-2 rounded shadow bg-gray-600 text-white placeholder-gray-100" placeholder="Type your task" 
  [(ngModel)]="newTask"
  (keydown.enter)="addTask()">
  
  
</div>

<div class="flex flex-col mt-6">
  <app-task-list [taskList]="taskList" (complete) = "OnComplete($event)" (important) = "OnImportant($event)"></app-task-list>
  
</div>
